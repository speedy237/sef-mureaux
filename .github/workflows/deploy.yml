name: Deploy SEF Stock — GitHub Pages

on:
  push:
    branches:
      - main        # déclenche le déploiement à chaque push sur main
  workflow_dispatch: # permet de lancer manuellement depuis GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Injecte les secrets GitHub comme variables d'environnement Vite
      - name: Create .env
        run: |
          echo "VITE_APPS_SCRIPT_URL=${{ secrets.VITE_APPS_SCRIPT_URL }}" >> .env

      - name: Build
        run: yarn build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
