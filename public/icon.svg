<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond dégradé vert -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c4a35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d6b4f;stop-opacity:1" />
    </linearGradient>
    
    <!-- Ombre portée pour le texte -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fond avec coins arrondis -->
  <rect width="512" height="512" fill="url(#bg)" rx="90"/>
  
  <!-- Cercle décoratif en arrière-plan -->
  <circle cx="256" cy="256" r="180" fill="#2d6b4f" opacity="0.3"/>
  
  <!-- Mains qui donnent/reçoivent (symbole de solidarité) -->
  <g transform="translate(256, 180)">
    <!-- Main gauche (qui donne) -->
    <path d="M -80,-20 L -80,0 Q -80,15 -70,15 L -30,15 Q -20,15 -20,5 L -20,-15 Q -20,-25 -30,-25 L -70,-25 Q -80,-25 -80,-20 Z" 
          fill="#f5f0e8" opacity="0.95"/>
    
    <!-- Main droite (qui reçoit) -->
    <path d="M 80,-20 L 80,0 Q 80,15 70,15 L 30,15 Q 20,15 20,5 L 20,-15 Q 20,-25 30,-25 L 70,-25 Q 80,-25 80,-20 Z" 
          fill="#f5f0e8" opacity="0.95"/>
    
    <!-- Cœur au centre (solidarité) -->
    <path d="M 0,0 Q -15,-15 -25,-15 Q -35,-15 -35,-5 Q -35,10 0,30 Q 35,10 35,-5 Q 35,-15 25,-15 Q 15,-15 0,0 Z" 
          fill="#d4870a" transform="scale(0.9)"/>
  </g>
  
  <!-- Texte "SERVIR" stylisé -->
  <g filter="url(#shadow)">
    <text x="256" y="310" 
          font-family="'Arial Black', 'Helvetica', sans-serif" 
          font-size="72" 
          font-weight="900" 
          fill="#ffffff" 
          text-anchor="middle"
          letter-spacing="-2">SERVIR</text>
  </g>
  
  <!-- Symbole "+" stylisé -->
  <g transform="translate(256, 370)">
    <!-- Cercle de fond pour le + -->
    <circle cx="0" cy="0" r="35" fill="#d4870a"/>
    
    <!-- Croix + -->
    <rect x="-20" y="-5" width="40" height="10" fill="#ffffff" rx="3"/>
    <rect x="-5" y="-20" width="10" height="40" fill="#ffffff" rx="3"/>
  </g>
  
  <!-- Sous-titre "Solidarité" (optionnel, petit) -->
  <text x="256" y="445" 
        font-family="'Georgia', serif" 
        font-size="20" 
        font-style="italic"
        fill="#f5f0e8" 
        text-anchor="middle"
        opacity="0.9">Solidarité Alimentaire</text>
</svg>
