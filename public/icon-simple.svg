<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond dégradé vert -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c4a35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d6b4f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond avec coins arrondis -->
  <rect width="512" height="512" fill="url(#bg)" rx="90"/>
  
  <!-- Logo simplifié : S+ dans un cercle -->
  <g transform="translate(256, 256)">
    <!-- Cercle de fond -->
    <circle cx="0" cy="0" r="160" fill="#ffffff" opacity="0.15"/>
    
    <!-- Lettre "S" stylisée -->
    <text x="-30" y="50" 
          font-family="'Arial Black', sans-serif" 
          font-size="180" 
          font-weight="900" 
          fill="#ffffff">S</text>
    
    <!-- Symbole "+" -->
    <g transform="translate(75, -10)">
      <circle cx="0" cy="0" r="45" fill="#d4870a"/>
      <rect x="-25" y="-6" width="50" height="12" fill="#ffffff" rx="3"/>
      <rect x="-6" y="-25" width="12" height="50" fill="#ffffff" rx="3"/>
    </g>
  </g>
</svg>
